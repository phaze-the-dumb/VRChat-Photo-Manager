<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRC Photo Manager</title>

    <script src="https://kit.fontawesome.com/9a203e5ff1.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root">
      <div class="loading">Loading...</div>

      <div class="nav-bar"></div>
      <div class="notification-copy">Image Copied to Clipboard</div>

      <div class="image-view">
        <div class="image-view-blackout"></div>
        <div class="image-close"><i class="fa-solid fa-xmark"></i></div>

        <div class="image-view-controls">
          <div class="image-controls-button" id="image-copy-button"><i class="fa-solid fa-copy"></i></div>
          <div class="image-controls-button" id="image-share-button"><i class="fa-solid fa-share"></i></div>
          <div class="image-controls-button" id="image-warning-button"><i class="fa-solid fa-triangle-exclamation"></i></div>
          <div class="image-controls-button" id="image-info-button"><i class="fa-solid fa-circle-info"></i></div>
        </div>
      </div>

      <div class="image-tray"></div>

      <div class="context-menu"></div>
      <div class="image-container"></div>
    </div>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
